name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build, Vet & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Download Go modules
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: go test
        # -count=1 disables the test cache so each CI run is fresh.
        # No external services required: Qdrant tests mock the client,
        # DeepSeek tests use httptest, Redis workspace tests skip when
        # Redis is unavailable.
        run: go test -count=1 -timeout=10m ./...
